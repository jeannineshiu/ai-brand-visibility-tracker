name: brand-tracker
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # LLM APIs
    - openai>=1.30.0
    - anthropic>=0.28.0
    - google-genai>=1.0.0
    # NLP
    - spacy>=3.7.0
    - transformers>=4.40.0
    - torch>=2.2.0
    # Data
    - pandas>=2.2.0
    - google-cloud-bigquery>=3.20.0
    - db-dtypes>=1.2.0
    # ML
    - lightgbm>=4.3.0
    - scikit-learn>=1.4.0
    # API + Viz
    - fastapi>=0.111.0
    - uvicorn>=0.29.0
    - plotly>=5.22.0
    - dash>=2.17.0
    # Utils
    - python-dotenv>=1.0.0
    - pydantic>=2.7.0
    - httpx>=0.27.0
    - tenacity>=8.3.0
    - rich>=13.7.0
    - pytest>=8.2.0
    - pytest-asyncio>=0.23.0
